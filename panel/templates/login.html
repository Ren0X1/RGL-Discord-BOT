<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel · Acceso</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115; color: #e6e8eb;
    }
    .card {
      background: #181b21; border: 1px solid #262a31; border-radius: 14px;
      padding: 32px; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    h1 { margin: 0 0 4px; font-size: 20px; }
    p.sub { margin: 0 0 20px; color: #8b929e; font-size: 13px; }
    label { display: block; font-size: 13px; color: #b6bcc6; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 12px; border-radius: 9px; border: 1px solid #2c313a;
      background: #0f1115; color: #e6e8eb; font-size: 14px; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #5865f2; }
    button {
      width: 100%; padding: 11px; border: none; border-radius: 9px; cursor: pointer;
      background: #5865f2; color: #fff; font-size: 14px; font-weight: 600;
    }
    button:hover { background: #4752c4; }
    .flash { background: #3a1d22; border: 1px solid #6b2a33; color: #f3b6bd;
             padding: 9px 12px; border-radius: 9px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ url_for('login') }}">
    <h1>🤖 Panel del bot</h1>
    <p class="sub">Introduce la contraseña para continuar</p>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash">{{ msgs[0] }}</div>{% endif %}
    {% endwith %}
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" autofocus required>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
